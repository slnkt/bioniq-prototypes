};

/* ─── CONTEXT ──────────────────────────────────────────────────────────── */
const Ctx = createContext(null);

function AppProvider({ children }) {
  const [cart,         setCart]         = useState([]);
  const [user,         setUser]         = useState(null);
  const [orders,       setOrders]       = useState(MOCK_ORDERS);
  const [authOpen,     setAuthOpen]     = useState(false);
  const [authCb,       setAuthCb]       = useState(null);
  const [callbackOpen, setCallbackOpen] = useState(false);
  const [notifyProduct, setNotifyProduct] = useState(null);
  const [requestOpen, setRequestOpen] = useState(false);
  const [curOrder,     setCurOrder]     = useState(null);
  const [toast,        setToast]        = useState(null);
  const [ts,           setTs]           = useState({ outOfStock:false, payFail:false, delivErr:false });

  const showToast = useCallback((msg, type='ok') => {
    setToast({ msg, type, id: Date.now() });
    setTimeout(() => setToast(null), 3000);
  }, []);

  const isAvailable = vid => {
    if (ts.outOfStock && (vid==='vit-immune'||vid==='vit-curcumin')) return false;
    return (getV(vid)?.stock ?? 0) > 0;
  };
  const isKitAvailable = kit => kit.available && kit.items.every(i => isAvailable(i.vid));

  const effStock = vid => {
    if (ts.outOfStock && (vid==='vit-immune'||vid==='vit-curcumin')) return 0;
    const base = getV(vid)?.stock ?? 0;
    const used = cart.reduce((sum, c) => {
      if (c.type === 'vitamin' && c.id === vid) return sum + c.qty;
      if (c.type === 'kit' && c.items) {
        const ki = c.items.find(i => i.vid === vid);
        if (ki) return sum + ki.qty * c.qty;
      }
      return sum;
    }, 0);
    return Math.max(0, base - used);
  };

  const cartCount    = cart.reduce((s,i) => s+i.qty, 0);
  const cartSubtotal = cart.reduce((s,i) => s+i.price*i.qty, 0);

  const addToCart = item => {
    const delta = item.qty || 1;
    const s = effStock(item.id);
    if (delta > s) {
      showToast(s===0 ? 'Товар закончился' : 'Недостаточно остатка', s===0?'err':'warn');
      return false;
    }
    setCart(prev => {
      const ex = prev.find(c => c.id===item.id && c.type !== 'kit');
      if (ex) return prev.map(c => c===ex ? {...c, qty:c.qty+delta} : c);
      return [...prev, { ...item, qty:delta }];
    });
    showToast(item.name + ' добавлен в корзину');
    return true;
  };

  const addKitToCart = (kit, addQty=1) => {
    if (!kit.available) { showToast('Набор недоступен', 'err'); return false; }
    const bad = kit.items.filter(i => effStock(i.vid) < i.qty * addQty).map(i => getV(i.vid)?.name);
    if (bad.length) { showToast('Нет в наличии: ' + bad.join(', '), 'err'); return false; }
    setCart(prev => {
      const existing = prev.find(c => c.type==='kit' && c.id===kit.id);
      if (existing) return prev.map(c => c===existing ? {...c, qty:c.qty+addQty} : c);
      return [...prev, { type:'kit', id:kit.id, name:kit.name, price:kit.price, qty:addQty, items:kit.items, imgs:kit.imgs }];
    });
    showToast('Набор «' + kit.name + '» добавлен' + (addQty > 1 ? ' (×' + addQty + ')' : ''));
    return true;
  };

  const updQty = (id, d) => setCart(prev => prev.map(c => {
    if (c.id!==id) return c;
    const nq = c.qty+d;
    if (nq<1) return c;
    if (d > 0) {
      if (c.type==='kit') {
        const k = getK(id);
        const out = k?.items.find(i => effStock(i.vid) < i.qty * d);
        if (out) { showToast('Недостаточно остатка', 'warn'); return c; }
      } else {
        if (d > effStock(id)) { showToast('Недостаточно остатка', 'warn'); return c; }
      }
    }
    return {...c, qty:nq};
  }));

  const removeItem = id => setCart(prev => prev.filter(c => c.id!==id));

  const requireAuth = cb => {
    if (user) { cb(); return; }
    setAuthCb(() => cb);
    setAuthOpen(true);
  };

  const login = email => {
    setUser({ email, name: email.split('@')[0] });
    setAuthOpen(false);
    if (authCb) { authCb(); setAuthCb(null); }
  };

  const placeOrder = data => {
    const o = {
      id: 'ORD-' + Date.now(),
      date: new Date().toISOString().slice(0,10),
      items: cart.map(c => ({ vid:c.id, qty:c.qty, name:c.name, price:c.price })),
      total: data.total, delivery: data.delivCost, address: data.address,
      payStatus:'paid', orderStatus:'processing', delivStatus:'pending', tracking:null,
    };
    setOrders(prev => [o, ...prev]);
    setCurOrder(o);
    setCart([]);
    return o;
  };

  return (
    <Ctx.Provider value={{ cart, cartCount, cartSubtotal, addToCart, addKitToCart, updQty, removeItem,
      user, login, logout:()=>setUser(null), requireAuth, authOpen, setAuthOpen,
      callbackOpen, setCallbackOpen,
      notifyProduct, setNotifyProduct,
      requestOpen, setRequestOpen,
      isAvailable, isKitAvailable,
      orders, placeOrder, curOrder, setCurOrder,
      toast, showToast, ts, setTs, effStock, PROMOS }}>
      {children}
    </Ctx.Provider>
  );
}
const useApp = () => useContext(Ctx);

  if (!callbackOpen) return null;

  const fmtPhone = v => {
    let d = v.replace(/\D/g,'');
    if (d.startsWith('8')) d = '7' + d.slice(1);
    if (!d.startsWith('7')) d = '7' + d;
    d = d.slice(0,11);
    let f = '+7';
    if (d.length>1) f += ' (' + d.slice(1,4);
    if (d.length>=4) f += ') ' + d.slice(4,7);
    if (d.length>=7) f += '-' + d.slice(7,9);
    if (d.length>=9) f += '-' + d.slice(9,11);
    return f;
  };

  const close = () => {
    setCallbackOpen(false);
    setTimeout(()=>{ setName(''); setPhone(''); setSent(false); setErr({}); }, 200);
  };

  const submit = () => {
    const e = {};
    if (!name.trim()) e.name = 'Введите имя';
    if (phone.replace(/\D/g,'').length < 11) e.phone = 'Введите телефон';
    if (!agree) e.agree = 'Необходимо согласие';
    setErr(e);
    if (Object.keys(e).length) return;
    setSent(true);
    showToast('Заявка принята — мы перезвоним в течение 30 минут');
    setTimeout(close, 1800);
  };

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center fade-in" style={{background:'rgba(0,0,0,0.5)'}} onClick={close}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md mx-4 p-8" onClick={e=>e.stopPropagation()}>

            </div>
            <h3 className="text-ink mb-2" style={{fontSize:'22px',fontWeight:700,letterSpacing:'-0.01em'}}>Заявка принята</h3>
            <p className="text-secondary text-sm">Перезвоним на {phone} в течение 30 минут</p>
          </div>
        ) : (
          <>
            <div className="flex justify-between items-start mb-3">
              <h2 className="text-ink" style={{fontSize:'24px',fontWeight:700,letterSpacing:'-0.01em'}}>Обратный звонок</h2>
              <button onClick={close} className="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-xl hover:bg-gray-200 transition-colors">×</button>
            </div>
            <p className="text-secondary text-sm mb-6">Оставьте контакты — наш специалист перезвонит в течение 30 минут и поможет подобрать комплекс.</p>
            <div className="space-y-3 mb-5">
              <div>
                <input placeholder="Ваше имя" value={name}
                  onChange={e=>{setName(e.target.value);setErr(p=>({...p,name:null}));}}

              <div>

/* ─── VITAMIN CARD ───────────────────────────────────────────────────────── */
function VitCard({ v }) {
  const { addToCart, updQty, removeItem, effStock, cart, setNotifyProduct } = useApp();
  const history = useHistory();
  const s = effStock(v.id);
  const cartItem = cart.find(c => c.type==='vitamin' && c.id===v.id);
  const inCart = cartItem?.qty || 0;
  const [imgIdx, setImgIdx] = useState(0);
  const imgs = v.imgs || [];

  const handleAdd = e => {
    e.stopPropagation();
    addToCart({ id:v.id, type:'vitamin', name:v.name, price:v.price });
  };
  const handleInc = e => {
    e.stopPropagation();
    updQty(v.id, 1);
  };
  const handleDec = e => {
    e.stopPropagation();
    if (inCart <= 1) removeItem(v.id);
    else updQty(v.id, -1);
  };
  const handleGoCart = e => { e.stopPropagation(); history.push('/cart'); };
  const handleBuyNow = e => {
    e.stopPropagation();
    if (inCart > 0) { history.push('/checkout'); return; }
    if (addToCart({ id:v.id, type:'vitamin', name:v.name, price:v.price })) {
      history.push('/checkout');
    }
  };

  return (
    <div className="bg-white overflow-hidden card-hover cursor-pointer"
      onClick={() => history.push('/vitamins/'+v.id)}
      onMouseLeave={()=>setImgIdx(0)}>
      <div className="flex items-center justify-center relative overflow-hidden" style={{background:'#f4f2ee',aspectRatio:'4 / 5'}}>
        <img src={imgs[imgIdx]} alt={v.name} className="w-full h-full object-cover" style={{transition:'opacity .6s ease', filter: s===0 && inCart===0 ? 'grayscale(1) opacity(0.7)' : ''}} />
        {s===0 && inCart===0 && (
          <div className="absolute top-4 left-4 uppercase font-medium" style={{color:'rgba(0,0,0,0.54)',fontSize:'10px',letterSpacing:'0.12em'}}>
            Нет в наличии
          </div>
        )}
        {imgs.length > 1 && (
          <div className="absolute bottom-4 left-1/2 flex gap-1.5" style={{transform:'translateX(-50%)'}} onClick={e=>e.stopPropagation()}>
            {imgs.map((_, i) => (
              <button key={i}
                onMouseEnter={()=>setImgIdx(i)}
                onClick={()=>setImgIdx(i)}
                className="rounded-full transition-all"
                style={{
                  width: i===imgIdx ? '14px' : '6px',
                  height: '6px',
                  background: i===imgIdx ? '#042033' : 'rgba(0,0,0,0.18)',
                }}
                aria-label={'Фото '+(i+1)} />
            ))}
          </div>
        )}
      </div>
      <div className="pt-5">
        <h3 className="text-ink mb-1" style={{fontSize:'15px',fontWeight:500,letterSpacing:'-0.01em',lineHeight:1.3}}>{v.name}</h3>
        <p className="text-[12px] text-secondary mb-3">{v.sub}</p>
        <div className="flex items-baseline gap-2 num">
          <span className="text-ink" style={{fontSize:'15px',fontWeight:500,letterSpacing:'-0.01em'}}>{fmt(v.price)}</span>
          {v.orig>v.price && <span className="text-[12px] text-disabled line-through">{fmt(v.orig)}</span>}

  );

/* ─── CART PAGE ──────────────────────────────────────────────────────────── */
function CartPage() {
  const { cart, updQty, removeItem, addToCart, effStock, requireAuth, PROMOS } = useApp();
  const history = useHistory();
  const [promoIn, setPromoIn] = useState('');
  const [promo,   setPromo]   = useState(null);
  const [promoErr, setPromoErr] = useState('');

  const subtotal = cart.reduce((s,i) => s+i.price*i.qty, 0);
  const discount = promo ? Math.round(subtotal*promo.pct/100) : 0;
  const total    = subtotal - discount;

  const applyPromo = () => {
    const pct = PROMOS[promoIn.toUpperCase()];
    if (pct) { setPromo({ code:promoIn.toUpperCase(), pct }); setPromoErr(''); }
    else { setPromoErr('Промокод не найден'); setPromo(null); }

  const recs = VITAMINS.filter(v => !cart.find(c=>c.id===v.id)).slice(0,4);

  if (cart.length===0) return (
    <div className="max-w-2xl mx-auto px-6 py-24 text-center fade-in">

      <h2 className="text-2xl font-bold text-ink mb-3">Корзина пуста</h2>
      <p className="text-secondary mb-8">Добавьте витамины или наборы, чтобы продолжить</p>
      <Link to="/vitamins" className="btn-p px-8 py-3 font-semibold text-sm">Смотреть все витамины</Link>
    </div>
  );

  return (
    <div className="max-w-[1280px] mx-auto px-8 py-8 fade-in">
      <div className="mb-12">
        <p className="text-[11px] tracking-[0.2em] uppercase mb-4 text-secondary">Покупки</p>
        <h1 className="display text-ink" style={{fontSize:'56px',lineHeight:1}}>Корзина <span className="text-disabled num" style={{fontSize:'24px',fontFamily:'inherit'}}>{cart.length} поз.</span></h1>
      </div>
      <div className="grid lg:grid-cols-3 gap-8">
        <div className="lg:col-span-2 space-y-3">
          {cart.map(item => {
            const isKit = item.type === 'kit';
            const s = isKit ? Infinity : effStock(item.id);
            const vv = isKit ? null : getV(item.id);
            const photo = isKit ? (item.imgs||[])[0] : vv?.imgs?.[0];
            const subline = isKit
              ? 'В наборе: ' + item.items.map(i => getV(i.vid)?.name).join(', ')
              : fmt(item.price) + ' за штуку';
            return (
              <div key={item.id} className="bg-white rounded-2xl p-4 flex gap-4 border border-gray-100">
                <div className="w-20 h-20 rounded-xl flex items-center justify-center p-2 flex-shrink-0 relative" style={{background:'#f5f5f5'}}>
                  {photo && <img src={photo} alt={item.name} className="max-h-full max-w-full object-contain" />}
                  {isKit && <span className="absolute -top-1 -left-1 text-white text-[9px] px-1.5 py-0.5 rounded font-semibold uppercase tracking-wider" style={{background:'#042033'}}>Набор</span>}
                </div>
                <div className="flex-1 min-w-0">
                  <h3 className="font-semibold text-ink text-sm mb-0.5">{item.name}</h3>
                  <p className="text-secondary text-xs mb-2 truncate">{subline}</p>
                  {!isKit && s===0 && <p className="text-red-500 text-xs font-medium mb-2">⚠ Товар закончился</p>}
                  <div className="flex items-center gap-3">
                    <div className="flex items-center border border-gray-200 rounded-lg overflow-hidden bg-white">
                      <button className="w-8 h-8 flex items-center justify-center hover:bg-gray-50 transition-colors text-sm" onClick={()=>updQty(item.id,-1)}>−</button>
                      <span className="w-8 text-center text-sm font-semibold">{item.qty}</span>

                    <button onClick={()=>removeItem(item.id)} className="text-disabled hover:text-red-500 text-xs transition-colors">Удалить</button>

          <div className="bg-white rounded-2xl p-4 border border-gray-100">
            <p className="text-sm font-semibold text-ink mb-3">Промокод</p>
            <div className="flex gap-2">
              <input value={promoIn} onChange={e=>{setPromoIn(e.target.value);setPromoErr('');}}

              <button onClick={applyPromo} className="btn-o px-4 py-2 text-sm font-semibold">Применить</button>
            </div>
            {promoErr && <p className="text-red-500 text-xs mt-2">{promoErr}</p>}
            {promo && <p className="text-green-600 text-xs mt-2 font-medium">✓ Промокод {promo.code} — скидка {promo.pct}%</p>}

          {recs.length>0 && (

              <p className="text-sm font-semibold text-ink mb-3">Добавить к заказу</p>

                {recs.map(vv => {

                  return (

                        <img src={vv.imgs[0]} alt={vv.name} className="max-h-full max-w-full object-contain" />
                      </div>
                      <p className="text-xs font-medium text-ink mb-1 leading-tight">{vv.name}</p>
                      <p className="text-xs text-secondary mb-2">{fmt(vv.price)}</p>
                      {s===0 ? <span className="text-xs text-disabled">Нет</span>
                        : <button onClick={e=>{e.stopPropagation();addToCart({id:vv.id,type:'vitamin',name:vv.name,price:vv.price,stock:s});}}
                            className="btn-p w-full py-1 text-xs font-semibold">+ Добавить</button>
                      }
                    </div>
                  );
                })}
              </div>
              <Link to="/vitamins" className="block mt-3 text-center text-xs hover:underline" style={{color:'#042033'}}>Смотреть все витамины →</Link>
            </div>
          )}
        </div>

        <div className="sticky top-20">
          <div className="bg-white rounded-2xl p-6 border border-gray-100">
            <h2 className="font-bold text-ink text-lg mb-4">Итого</h2>
            <div className="space-y-2 text-sm mb-4">
              <div className="flex justify-between"><span className="text-secondary">Товары</span><span>{fmt(subtotal)}</span></div>
              {discount>0 && <div className="flex justify-between text-green-600"><span>Скидка {promo.pct}%</span><span>−{fmt(discount)}</span></div>}
              <div className="flex justify-between"><span className="text-secondary">Доставка</span><span className="text-disabled">рассчитывается</span></div>
            </div>
            <div className="border-t border-gray-100 pt-4 mb-6">
              <div className="flex justify-between font-bold text-ink text-lg"><span>К оплате</span><span>{fmt(total)}</span></div>

            <button onClick={() => requireAuth(() => history.push('/checkout', { discount, promo }))}
              className="btn-p w-full py-4 font-bold text-base">Оформить заказ →</button>
            <Link to="/vitamins" className="block mt-3 text-center text-sm text-secondary hover:text-ink transition-colors">Продолжить покупки</Link>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── CHECKOUT PAGE ──────────────────────────────────────────────────────── */
function CheckoutPage() {
  const { cart, user, requireAuth, ts } = useApp();
  const history  = useHistory();
  const location = useLocation();
  const { discount=0, promo=null } = location.state || {};
  const [delType, setDelType] = useState('');
  const [pvz,    setPvz]     = useState(null);
  const [addr,   setAddr]    = useState('');
  const [pvzOpen,setPvzOpen] = useState(false);
  const [payM,   setPayM]    = useState('card');
  const [agreed, setAgreed]  = useState(false);
  const [errs,   setErrs]    = useState({});

  useEffect(() => { if (!user) requireAuth(()=>{}); }, []);
  if (cart.length===0) { history.push('/cart'); return null; }

  const subtotal  = cart.reduce((s,i)=>s+i.price*i.qty,0) - discount;
  const delivCost = delType ? (DELIVERY_OPTS.find(d=>d.id===delType)?.price??0) : null;
  const total     = subtotal + (delivCost||0);

  const validate = () => {
    const e={};
    if (!delType) e.del='Выберите способ доставки';
    if (delType==='pvz' && !pvz) e.pvz='Выберите пункт выдачи';
    if (delType==='courier' && !addr) e.addr='Введите адрес доставки';
    if (!agreed) e.agreed='Необходимо согласие с офертой';
    return e;
  };

  const submit = () => {
    const e=validate(); if (Object.keys(e).length){setErrs(e);return;}
    const address = delType==='pvz' ? pvz?.addr : addr;
    history.push('/payment', { total, delivCost, address, payM, discount, promo });
  };

  const activeDelivCls  = 'border-2 bg-white';
  const inactiveDelivCls = 'border-2 border-gray-100 hover:border-gray-200';

  return (
    <div className="max-w-[1280px] mx-auto px-8 py-8 fade-in">
      <div className="mb-12">
        <p className="text-[11px] tracking-[0.2em] uppercase mb-4 text-secondary">Шаг 2 из 3</p>
        <h1 className="display text-ink" style={{fontSize:'56px',lineHeight:1}}>Оформление заказа</h1>
      </div>
      <div className="grid lg:grid-cols-3 gap-8">
        <div className="lg:col-span-2 space-y-6">
          <div className="bg-white rounded-2xl p-6 border border-gray-100">
            <h2 className="font-bold text-ink mb-4">Доставка</h2>
            {ts.delivErr && (
              <div className="bg-orange-50 border border-orange-200 rounded-xl p-3 mb-4 text-sm text-orange-700">
                ⚠ Не удалось рассчитать стоимость. Цена будет уточнена оператором.
              </div>
            )}
            <div className="space-y-3 mb-4">
              {DELIVERY_OPTS.map(opt => (
                <label key={opt.id}
                  className={'flex items-center gap-4 p-4 rounded-xl cursor-pointer transition-all ' + (delType===opt.id ? activeDelivCls : inactiveDelivCls)}
                  style={delType===opt.id ? {borderColor:'#042033', background:'#F0F9FF'} : {}}
                  onClick={()=>{setDelType(opt.id);setErrs(e=>({...e,del:null}));}}>
                  <div className={'w-5 h-5 rounded-full border-2 flex items-center justify-center flex-shrink-0 ' + (delType===opt.id?'':'border-gray-300')}
                    style={delType===opt.id ? {borderColor:'#042033'} : {}}>
                    {delType===opt.id && <div className="w-2.5 h-2.5 rounded-full" style={{background:'#042033'}} />}
                  </div>
                  <span className="text-xl">{opt.icon}</span>
                  <div className="flex-1">
                    <p className="font-medium text-ink text-sm">{opt.label}</p>
                    <p className="text-xs text-secondary">{opt.days}</p>
                  </div>
                  <span className="font-semibold text-ink text-sm">{opt.price===0?'Бесплатно':fmt(opt.price)}</span>
                </label>
              ))}
            </div>
            {errs.del && <p className="text-red-500 text-xs mb-2">{errs.del}</p>}

            {delType==='pvz' && (
              <div className="mt-2">
                <button onClick={()=>setPvzOpen(o=>!o)}
                  className={'w-full border-2 rounded-xl p-4 text-left text-sm transition-colors ' + (pvz?'border-green-400 bg-green-50':'border-dashed border-gray-200 hover:border-gray-300')}>
                  {pvz ? <><span className="font-medium text-ink">{pvz.name}</span><br/><span className="text-secondary text-xs">{pvz.addr} · {pvz.h}</span></>
                    : <span className="text-secondary">📍 Выбрать пункт выдачи</span>}
                </button>
                {pvzOpen && (
                  <div className="mt-2 border border-gray-200 rounded-xl overflow-hidden shadow-sm">
                    {PVZ.map(p => (
                      <div key={p.id} className={'p-4 cursor-pointer transition-colors border-b last:border-0 ' + (pvz?.id===p.id?'bg-brand-tint':'hover:bg-gray-50')}
                        onClick={()=>{setPvz(p);setPvzOpen(false);setErrs(e=>({...e,pvz:null}));}}>
                        <p className="font-medium text-ink text-sm">{p.name}</p>
                        <p className="text-xs text-secondary">{p.addr}</p>
                        <p className="text-xs text-disabled">{p.h}</p>
                      </div>
                    ))}
                  </div>
                )}
                {errs.pvz && <p className="text-red-500 text-xs mt-1">{errs.pvz}</p>}
              </div>
            )}
            {delType==='courier' && (
              <div className="mt-2">
                <input value={addr} onChange={e=>{setAddr(e.target.value);setErrs(er=>({...er,addr:null}));}}
                  placeholder="Город, улица, дом, квартира" className={'inp ' + (errs.addr?'inp-err':'')} />
                {errs.addr && <p className="text-red-500 text-xs mt-1">{errs.addr}</p>}
              </div>
            )}
          </div>

          <div className="bg-white rounded-2xl p-6 border border-gray-100">
            <h2 className="font-bold text-ink mb-4">Способ оплаты</h2>
            <div className="grid grid-cols-3 gap-3">
              {PAY_METHODS.map(m => (
                <button key={m.id} onClick={()=>setPayM(m.id)}
                  className={'p-4 rounded-xl border-2 text-center transition-all ' + (payM===m.id?'':'border-gray-100 hover:border-gray-200')}
                  style={payM===m.id ? {borderColor:'#042033', background:'#F0F9FF'} : {}}>
                  <div className="text-2xl mb-1">{m.icon}</div>
                  <p className="text-xs font-medium text-ink">{m.label}</p>
                </button>
              ))}
            </div>
          </div>

          <div className="space-y-1">
            <label className="flex items-start gap-3 cursor-pointer" onClick={()=>{setAgreed(a=>!a);setErrs(e=>({...e,agreed:null}));}}>
              <div className={'mt-0.5 w-5 h-5 rounded border-2 flex items-center justify-center flex-shrink-0 transition-colors ' + (agreed?'':'border-gray-300')}
                style={agreed ? {background:'#042033', borderColor:'#042033'} : {}}>
                {agreed && <svg width="10" height="8" fill="none"><path d="M1 4l3 3 5-6" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>}
              </div>
              <p className="text-sm text-secondary">Я согласен с <a href="#" onClick={e=>e.preventDefault()} className="hover:underline" style={{color:'#042033'}}>условиями оферты</a> и <a href="#" onClick={e=>e.preventDefault()} className="hover:underline" style={{color:'#042033'}}>политикой конфиденциальности</a></p>
            </label>
            {errs.agreed && <p className="text-red-500 text-xs ml-8">{errs.agreed}</p>}
          </div>
        </div>

        <div className="sticky top-20">
          <div className="bg-white rounded-2xl p-6 border border-gray-100">
            <h2 className="font-bold text-ink text-lg mb-4">Ваш заказ</h2>
            <div className="space-y-2 text-sm mb-4">
              {cart.map(i=><div key={i.id} className="flex justify-between"><span className="text-secondary truncate mr-2">{i.name} ×{i.qty}</span><span>{fmt(i.price*i.qty)}</span></div>)}
            </div>
            <div className="border-t border-gray-100 pt-3 space-y-2 text-sm">
              <div className="flex justify-between"><span className="text-secondary">Товары</span><span>{fmt(cart.reduce((s,i)=>s+i.price*i.qty,0))}</span></div>
              {discount>0 && <div className="flex justify-between text-green-600"><span>Скидка</span><span>−{fmt(discount)}</span></div>}
              <div className="flex justify-between">
                <span className="text-secondary">Доставка</span>
                <span>{delivCost===null?'—':delivCost===0?'Бесплатно':fmt(delivCost)}</span>
              </div>
            </div>
            <div className="border-t border-gray-100 mt-3 pt-3 mb-6">
              <div className="flex justify-between font-bold text-ink text-lg"><span>Итого</span><span>{fmt(total)}</span></div>
            </div>
            <button onClick={submit} className="btn-p w-full py-4 font-bold text-base">Оплатить {fmt(total)}</button>
            <button onClick={()=>history.push('/cart')} className="w-full mt-3 text-sm text-secondary hover:text-ink transition-colors">← Назад в корзину</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── PAYMENT PAGE ───────────────────────────────────────────────────────── */
function PaymentPage() {
  const { placeOrder, ts } = useApp();
  const history  = useHistory();
  const location = useLocation();
  const { total, delivCost, address, payM } = location.state || {};
  const [card, setCard] = useState('');
  const [exp,  setExp]  = useState('');
  const [cvv,  setCvv]  = useState('');
  const [loading, setLoading] = useState(false);

  if (!total) { history.push('/cart'); return null; }

  const fmtCard = v => v.replace(/\D/g,'').slice(0,16).replace(/(\d{4})(?=\d)/g,'$1 ');
  const fmtExp  = v => { const d=v.replace(/\D/g,''); return d.length>=2?d.slice(0,2)+'/'+d.slice(2,4):d; };

  const pay = () => {
    setLoading(true);
    setTimeout(() => {
      setLoading(false);
      if (ts.payFail) {
        history.push('/order-failed', { total, reason:'Отклонено банком' });
      } else {
        const order = placeOrder({ total, delivCost, address });
        history.push('/order-success', { order });
      }
    }, 2000);
  };

  const method = PAY_METHODS.find(m=>m.id===payM) || PAY_METHODS[0];

  return (
    <div className="min-h-screen flex items-center justify-center px-4 fade-in" style={{background:'#fafafa'}}>
      <div className="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
        <div className="text-center mb-8">
          <div className="text-5xl mb-3">{method.icon}</div>
          <h1 className="text-2xl font-bold text-ink">Оплата заказа</h1>
          <p className="text-secondary text-sm mt-1">{method.label}</p>
          <p className="text-3xl font-bold mt-3" style={{color:'#042033'}}>{fmt(total)}</p>
        </div>

        {payM==='card' && (
          <div className="space-y-4 mb-6">
            <div>
              <label className="text-xs text-secondary font-medium block mb-1">Номер карты</label>
              <input value={card} onChange={e=>setCard(fmtCard(e.target.value))} placeholder="0000 0000 0000 0000"
                className="inp font-mono tracking-widest" maxLength="19" />
            </div>
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="text-xs text-secondary font-medium block mb-1">Срок действия</label>
                <input value={exp} onChange={e=>setExp(fmtExp(e.target.value))} placeholder="MM/YY"
                  className="inp" maxLength="5" />
              </div>
              <div>
                <label className="text-xs text-secondary font-medium block mb-1">CVV</label>
                <input value={cvv} onChange={e=>setCvv(e.target.value.replace(/\D/g,'').slice(0,3))} placeholder="•••" type="password"
                  className="inp" maxLength="3" />
              </div>
            </div>
          </div>
        )}
        {payM==='sbp' && (
          <div className="rounded-xl p-6 mb-6 text-center border" style={{background:'#EBF7FD', borderColor:'#E5EDF2'}}>
            <p className="text-sm font-medium mb-4" style={{color:'#042033'}}>Отсканируйте QR-код в приложении банка</p>
            <div className="w-36 h-36 bg-white border-4 rounded-xl mx-auto flex items-center justify-center text-5xl" style={{borderColor:'#E5EDF2'}}>📲</div>
          </div>
        )}
        {payM==='yoomoney' && (
          <div className="bg-yellow-50 border border-yellow-200 rounded-xl p-6 mb-6 text-center">
            <div className="text-4xl mb-2">💛</div>
            <p className="text-sm text-yellow-700">Нажмите «Оплатить» для перехода в ЮMoney</p>
          </div>
        )}

        {ts.payFail && (
          <div className="bg-red-50 border border-red-200 rounded-xl p-3 mb-4 text-sm text-red-600 text-center">
            ⚠ Тестовый режим: оплата завершится ошибкой
          </div>
        )}

        <button onClick={pay} disabled={loading} className="btn-p w-full py-4 font-bold text-base">
          {loading
            ? <span className="flex items-center justify-center gap-2">
                <span className="w-4 h-4 rounded-full border-2 border-white/30 border-t-white spin inline-block" />
                Обработка…
              </span>
            : 'Оплатить ' + fmt(total)
          }
        </button>
        <button onClick={()=>history.push('/checkout')} className="w-full mt-3 text-sm text-secondary hover:text-ink transition-colors py-2">
          Закрыть
        </button>
        <p className="text-center text-xs text-disabled mt-4">🔒 Защищённое соединение</p>
      </div>
    </div>
  );
}

/* ─── ORDER SUCCESS ──────────────────────────────────────────────────────── */
function OrderSuccess() {
  const { curOrder } = useApp();
  const history  = useHistory();
  const location = useLocation();
  const order = location.state?.order || curOrder;

  return (
    <div className="min-h-screen flex items-center justify-center px-4 fade-in" style={{background:'#fafafa'}}>
      <div className="bg-white rounded-2xl shadow-xl p-8 w-full max-w-lg text-center">
        <div className="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
          <svg width="36" height="36" fill="none" viewBox="0 0 24 24">
            <path d="M5 13l4 4L19 7" stroke="#16a34a" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </div>
        <h1 className="text-3xl font-bold text-ink mb-2">Заказ оформлен!</h1>
        <p className="text-secondary mb-1">Оплата прошла успешно</p>
        {order && <p className="font-bold text-lg mb-6" style={{color:'#042033'}}>#{order.id}</p>}

        {order && (
          <div className="rounded-xl p-4 mb-6 text-left" style={{background:'#fafafa'}}>
            <p className="text-xs font-semibold text-secondary uppercase tracking-wider mb-3">Состав заказа</p>
            {order.items.map((i,n) => (
              <div key={n} className="flex justify-between text-sm py-2 border-b border-gray-100 last:border-0">
                <span className="text-ink">{i.name} <span className="text-secondary">×{i.qty}</span></span>
                <span className="font-medium text-ink">{fmt(i.price*i.qty)}</span>
              </div>
            ))}
            <div className="flex justify-between font-bold text-ink pt-3 border-t border-gray-100 mt-1">
              <span>Итого</span><span>{fmt(order.total)}</span>
            </div>
            {order.address && <p className="text-xs text-secondary mt-3">📍 {order.address}</p>}
          </div>
        )}

        <div className="rounded-xl p-4 mb-6 text-sm text-left" style={{background:'#EBF7FD', color:'#0a3550'}}>
          📦 Заказ передан в сборку. Ожидайте SMS с трек-номером СДЭК.
        </div>

        <div className="space-y-3">
          <button onClick={()=>history.push('/account/orders')} className="btn-p w-full py-3 font-semibold">Перейти в личный кабинет</button>
          <button onClick={()=>history.push('/vitamins')} className="btn-o w-full py-3 font-semibold">Вернуться в магазин</button>
          <button onClick={()=>history.push('/')} className="w-full text-sm text-secondary hover:text-ink transition-colors py-2">На главную</button>
        </div>
      </div>
    </div>
  );
}

/* ─── ORDER FAILED ───────────────────────────────────────────────────────── */
function OrderFailed() {
  const history  = useHistory();
  const location = useLocation();
  const { total, reason='Неизвестная ошибка' } = location.state || {};
  return (
    <div className="min-h-screen flex items-center justify-center px-4 fade-in" style={{background:'#fafafa'}}>
      <div className="bg-white rounded-2xl shadow-xl p-8 w-full max-w-lg text-center">
        <div className="w-20 h-20 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-6">
          <svg width="36" height="36" fill="none" viewBox="0 0 24 24">
            <path d="M18 6L6 18M6 6l12 12" stroke="#dc2626" strokeWidth="2.5" strokeLinecap="round"/>
          </svg>
        </div>
        <h1 className="text-3xl font-bold text-ink mb-2">Оплата не прошла</h1>
        <p className="text-secondary mb-2">Причина: {reason}</p>
        {total && <p className="text-disabled text-sm mb-6">Сумма заказа: {fmt(total)}</p>}
        <div className="rounded-xl p-4 mb-6 text-sm text-secondary text-left" style={{background:'#fafafa'}}>
          ✅ Ваша корзина сохранена. Попробуйте снова или выберите другой способ оплаты.
        </div>
        <div className="space-y-3">
          <button onClick={()=>history.push('/payment', { total })} className="btn-p w-full py-3 font-semibold">🔄 Повторить оплату</button>
          <button onClick={()=>history.push('/checkout')} className="btn-o w-full py-3 font-semibold">💳 Другой способ оплаты</button>
          <button onClick={()=>history.push('/cart')} className="w-full text-sm text-secondary hover:text-ink transition-colors py-2">Вернуться в корзину</button>
        </div>
      </div>
    </div>
  );
}

/* ─── ACCOUNT ORDERS ─────────────────────────────────────────────────────── */
function AccountOrders() {
  const { orders, user, requireAuth } = useApp();
  const history = useHistory();
  useEffect(() => { if (!user) requireAuth(()=>{}); }, []);

  if (!user) return (
    <div className="max-w-md mx-auto px-6 py-24 text-center">
      <div className="text-5xl mb-4">🔒</div>
      <p className="text-secondary mb-6">Войдите, чтобы просмотреть заказы</p>
      <button onClick={()=>requireAuth(()=>{})} className="btn-p px-6 py-3 font-semibold text-sm">Войти в аккаунт</button>
    </div>
  );

  return (
    <div className="max-w-3xl mx-auto px-6 py-8 fade-in">
      <div className="flex items-center gap-4 mb-8">
        <div className="w-12 h-12 rounded-full flex items-center justify-center text-xl" style={{background:'#E5EDF2'}}>👤</div>
        <div>
          <h1 className="text-2xl font-bold text-ink">{user.name}</h1>
          <p className="text-secondary text-sm">{user.email}</p>
        </div>
      </div>
      <h2 className="text-xl font-bold text-ink mb-4">История заказов</h2>
      {orders.length===0 ? (
        <div className="text-center py-16">
          <div className="text-5xl mb-4">📦</div>
          <p className="text-secondary mb-6">У вас пока нет заказов</p>
          <Link to="/vitamins" className="btn-p px-6 py-3 font-semibold text-sm">Перейти в магазин</Link>
        </div>
      ) : (
        <div className="space-y-3">
          {orders.map(o => {
            const st = ORDER_STATUS[o.orderStatus] || ORDER_STATUS.processing;
            return (
              <div key={o.id} className="bg-white rounded-2xl p-5 border border-gray-100 card-hover cursor-pointer"
                onClick={()=>history.push('/account/orders/'+o.id)}>
                <div className="flex items-start justify-between mb-3">
                  <div>
                    <p className="font-bold text-ink">#{o.id}</p>
                    <p className="text-xs text-secondary mt-0.5">{o.date}</p>
                  </div>
                  <span className={'inline-flex items-center px-3 py-1 rounded-full text-xs font-semibold ' + st.cls}>{st.label}</span>
                </div>
                <p className="text-sm text-secondary mb-3">
                  {o.items.slice(0,2).map(i=>`${i.name} ×${i.qty}`).join(', ')}
                  {o.items.length>2 && ` + ещё ${o.items.length-2}`}
                </p>
                <div className="flex items-center justify-between">
                  <span className="font-bold text-ink">{fmt(o.total)}</span>
                  {o.tracking && <span className="text-xs text-secondary">📦 {o.tracking}</span>}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ─── ACCOUNT ORDER DETAIL ───────────────────────────────────────────────── */
function ReviewItemForm({ item, review, onSubmit }) {
  const [rating, setRating] = useState(review?.rating || 0);
  const [hoverRating, setHoverRating] = useState(0);
  const [text,   setText]   = useState(review?.text || '');
  const submitted = review?.submitted;

  if (submitted) {
    return (
      <div className="py-4 border-b border-gray-100 last:border-0">
        <div className="flex items-center justify-between mb-2">
          <span className="font-semibold text-ink text-sm">{item.name}</span>
          <span className="text-[11px] uppercase inline-flex items-center gap-1.5 text-secondary" style={{letterSpacing:'0.1em'}}>
            <svg width="11" height="11" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
            Отзыв отправлен
          </span>
        </div>
        <div className="flex items-center gap-2 mb-1">
          <Stars rating={review.rating} size={14} />
          <span className="text-[12px] text-secondary">{review.rating}/5</span>
        </div>
        {review.text && <p className="text-[13px] text-secondary mt-2 leading-snug">«{review.text}»</p>}
      </div>
    );
  }

  return (
    <div className="py-4 border-b border-gray-100 last:border-0">
      <div className="font-semibold text-ink text-sm mb-3">{item.name}</div>
      <div className="flex gap-1 mb-3" onMouseLeave={()=>setHoverRating(0)}>
        {[1,2,3,4,5].map(i => (
          <button key={i} type="button"
            onClick={()=>setRating(i)}
            onMouseEnter={()=>setHoverRating(i)}
            className="hover:scale-110 transition-transform">
            <svg width="28" height="28" viewBox="0 0 24 24" fill={(hoverRating || rating) >= i ? '#042033' : 'rgba(4,32,51,0.12)'}>
              <path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.27 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/>
            </svg>
          </button>
        ))}
        {rating > 0 && <span className="text-[12px] text-secondary self-center ml-2">{rating}/5</span>}
      </div>
      <textarea value={text} onChange={e=>setText(e.target.value)}
        placeholder="Расскажите о впечатлениях (необязательно)…"
        className="inp resize-none mb-3" rows={2} style={{fontSize:'13px'}} />
      <button onClick={()=>onSubmit(rating, text)} disabled={!rating}
        className={'btn-p px-5 py-2 text-[13px] font-semibold ' + (!rating?'!opacity-40 !cursor-not-allowed':'')}>
        Отправить отзыв
      </button>
    </div>
  );
}

function AccountOrderDetail() {
  const { id } = useParams();
  const { orders, addToCart, effStock, showToast } = useApp();
  const history = useHistory();
  const [reviews, setReviews] = useState({});
  const o = orders.find(x=>x.id===id);

  if (!o) return (
    <div className="max-w-2xl mx-auto px-6 py-16 text-center">
      <p className="text-secondary mb-4">Заказ не найден</p>
      <button onClick={()=>history.push('/account/orders')} className="btn-p px-6 py-3 font-semibold">← К заказам</button>
    </div>
  );

  const st  = ORDER_STATUS[o.orderStatus]  || ORDER_STATUS.processing;
  const dst = DELIV_STATUS[o.delivStatus] || DELIV_STATUS.pending;
  const stepIdx = ORDER_STEPS.findIndex(s=>s.key===o.orderStatus);

  const repeat = () => {
    o.items.forEach(i => {
      const s = effStock(i.vid);
      addToCart({ id:i.vid, type:'vitamin', name:i.name, price:i.price, stock:s, qty:i.qty });
    });
    history.push('/cart');
  };

  const submitReview = (vid, rating, text) => {
    setReviews(prev => ({ ...prev, [vid]: { rating, text, submitted:true } }));
    showToast('Спасибо за отзыв!');
  };

  return (
    <div className="max-w-2xl mx-auto px-6 py-8 fade-in">
      <button onClick={()=>history.push('/account/orders')} className="text-secondary hover:text-ink text-sm mb-6 flex items-center gap-1 transition-colors">← К заказам</button>
      <div className="flex items-start justify-between mb-6">
        <div>
          <h1 className="text-2xl font-bold text-ink">#{o.id}</h1>
          <p className="text-secondary text-sm">от {o.date}</p>
        </div>
        <span className={'inline-flex items-center px-3 py-1 rounded-full text-xs font-semibold ' + st.cls}>{st.label}</span>
      </div>

      <div className="bg-white rounded-2xl p-6 border border-gray-100 mb-4">
        <div className="flex items-center overflow-x-auto">
          {ORDER_STEPS.map((step,i) => (
            <React.Fragment key={step.key}>
              <div className="flex flex-col items-center flex-shrink-0">
                <div className={'w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold transition-colors ' + (i<=stepIdx?'text-white':'bg-gray-100 text-disabled')}
                  style={i<=stepIdx ? {background:'#042033'} : {}}>
                  {i<stepIdx?'✓':i+1}
                </div>
                <p className="text-xs text-secondary mt-1 text-center w-16 leading-tight">{step.label}</p>
              </div>
              {i<ORDER_STEPS.length-1 && <div className={'flex-1 h-0.5 mx-1 mb-5 '} style={{background: i<stepIdx ? '#042033' : '#F0F0F0'}} />}
            </React.Fragment>
          ))}
        </div>
      </div>

      <div className="bg-white rounded-2xl p-5 border border-gray-100 mb-4">
        <h3 className="font-semibold text-ink mb-3">Доставка</h3>
        <span className={'inline-flex items-center px-3 py-1 rounded-full text-xs font-semibold mb-3 ' + dst.cls}>{dst.label}</span>
        {o.tracking && (
          <div className="flex items-center gap-2 mt-2 mb-2">
            <span className="text-sm text-secondary">Трек-номер СДЭК:</span>
            <span className="font-mono font-semibold text-ink px-3 py-1 rounded-lg text-sm" style={{background:'#fafafa'}}>{o.tracking}</span>
          </div>
        )}
        {o.address && <p className="text-sm text-secondary">📍 {o.address}</p>}
        {o.tracking && (
          <a href="#" onClick={e=>e.preventDefault()} className="btn-o mt-4 px-4 py-2 text-sm font-semibold inline-flex">
            Отследить в СДЭК →
          </a>
        )}
      </div>

      <div className="bg-white rounded-2xl p-5 border border-gray-100 mb-4">
        <h3 className="font-semibold text-ink mb-3">Состав заказа</h3>
        {o.items.map((i,n) => (
          <div key={n} className="flex justify-between text-sm py-2 border-b border-gray-50 last:border-0">
            <span className="text-ink">{i.name} <span className="text-secondary">×{i.qty}</span></span>
            <span className="font-medium">{fmt(i.price*i.qty)}</span>
          </div>
        ))}
        <div className="flex justify-between font-bold text-ink pt-3 border-t border-gray-100 mt-1">
          <span>Итого</span><span>{fmt(o.total)}</span>
        </div>
      </div>

      {o.orderStatus === 'delivered' && (
        <div className="bg-white rounded-2xl p-5 border border-gray-100 mb-4">
          <div className="flex items-center justify-between mb-1">
            <h3 className="font-semibold text-ink">Оценить покупки</h3>
            <span className="text-[11px] uppercase tracking-wider text-secondary">Доставлен</span>
          </div>
          <p className="text-secondary text-sm mb-2">Поставьте оценку и оставьте отзыв — это поможет другим покупателям.</p>
          {o.items.map(item => (
            <ReviewItemForm key={item.vid} item={item}
              review={reviews[item.vid]}
              onSubmit={(rating, text) => submitReview(item.vid, rating, text)} />
          ))}
        </div>
      )}

      <div className="flex gap-3">
        <button onClick={repeat} className="btn-p flex-1 py-3 font-semibold text-sm">🔄 Повторить заказ</button>
        <a href="#" onClick={e=>e.preventDefault()} className="btn-o flex-1 py-3 font-semibold text-sm text-center">💬 Поддержка</a>
      </div>
    </div>
  );
}

/* ─── APP ────────────────────────────────────────────────────────────────── */
function App() {
  return (
    <AppProvider>
      <HashRouter>
        <ScrollToTop />
        <Header />
        <main style={{minHeight:'calc(100vh - 64px)'}}>
          <Switch>
            <Route exact path="/" component={HomePage} />
            <Route exact path="/vitamins" component={VitaminsPage} />
            <Route exact path="/vitamins/:id" component={VitaminDetail} />
            <Route exact path="/checkups" component={CheckupsPage} />
            <Route exact path="/checkups/:id" component={CheckupDetail} />
            <Route exact path="/vitamin-kits/:id" component={KitDetail} />
            <Route exact path="/cart" component={CartPage} />
            <Route exact path="/checkout" component={CheckoutPage} />
            <Route exact path="/payment" component={PaymentPage} />
            <Route exact path="/order-success" component={OrderSuccess} />
            <Route exact path="/order-failed" component={OrderFailed} />
            <Route exact path="/account/orders" component={AccountOrders} />
            <Route exact path="/account/orders/:id" component={AccountOrderDetail} />
            <Redirect to="/" />
          </Switch>
        </main>
        <AuthModal />
        <CallbackModal />
        <NotifyModal />
        <RequestModal />
        <TestPanel />
        <Toast />
      </HashRouter>
    </AppProvider>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
