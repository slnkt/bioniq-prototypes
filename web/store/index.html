const wordForm = (n, [one, few, many]) => {
  const m10 = n % 10, m100 = n % 100;
  if (m10 === 1 && m100 !== 11) return one;
  if (m10 >= 2 && m10 <= 4 && (m100 < 10 || m100 >= 20)) return few;
  return many;
};

const Ctx = createContext(null);

/* localStorage helpers */
const LS = {
  get(key, fallback) {
    try { const v = localStorage.getItem(key); return v === null ? fallback : JSON.parse(v); }
    catch { return fallback; }
  },
  set(key, value) {
    try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
  },
};

function AppProvider({ children }) {
  const [cart,         setCart]         = useState(() => LS.get('bioniq.cart',   []));
  const [user,         setUser]         = useState(() => LS.get('bioniq.user',   null));
  const [orders,       setOrders]       = useState(() => LS.get('bioniq.orders', MOCK_ORDERS));
  const [authOpen,     setAuthOpen]     = useState(false);
  const [authCb,       setAuthCb]       = useState(null);
  const [callbackOpen, setCallbackOpen] = useState(false);
  const [notifyProduct, setNotifyProduct] = useState(null);
  const [requestOpen, setRequestOpen] = useState(false);
  const [curOrder,     setCurOrder]     = useState(null);
  const [toast,        setToast]        = useState(null);
  const [ts,           setTs]           = useState({ outOfStock:false, payFail:false, delivErr:false });

  const showToast = useCallback((msg, type='ok') => {
    setToast({ msg, type, id: Date.now() });
    setTimeout(() => setToast(null), 3000);
  }, []);

  /* Persist cart / user / orders in localStorage */
  useEffect(() => { LS.set('bioniq.cart',   cart);   }, [cart]);
  useEffect(() => { LS.set('bioniq.user',   user);   }, [user]);
  useEffect(() => { LS.set('bioniq.orders', orders); }, [orders]);

  const isAvailable = vid => {
    if (ts.outOfStock && (vid==='vit-immune'||vid==='vit-curcumin')) return false;
    return (getV(vid)?.stock ?? 0) > 0;
  };
  const isKitAvailable = kit => kit.available && kit.items.every(i => isAvailable(i.vid));

  const effStock = vid => {
    if (ts.outOfStock && (vid==='vit-immune'||vid==='vit-curcumin')) return 0;
    const base = getV(vid)?.stock ?? 0;
    const used = cart.reduce((sum, c) => {
      if (c.type === 'vitamin' && c.id === vid) return sum + c.qty;
      if (c.type === 'kit' && c.items) {
        const ki = c.items.find(i => i.vid === vid);
        if (ki) return sum + ki.qty * c.qty;
      }
      return sum;
    }, 0);
    return Math.max(0, base - used);
  };

  const cartCount    = cart.reduce((s,i) => s+i.qty, 0);
  const cartSubtotal = cart.reduce((s,i) => s+i.price*i.qty, 0);

  const addToCart = item => {
    const delta = item.qty || 1;
    const s = effStock(item.id);
    if (delta > s) {
      showToast(s===0 ? 'Товар закончился' : 'Недостаточно остатка', s===0?'err':'warn');
      return false;
    }
    setCart(prev => {
      const ex = prev.find(c => c.id===item.id && c.type !== 'kit');
      if (ex) return prev.map(c => c===ex ? {...c, qty:c.qty+delta} : c);
      return [...prev, { ...item, qty:delta }];
    });
    showToast(item.name + ' добавлен в корзину');
    return true;
  };

  const addKitToCart = (kit, addQty=1) => {
    if (!kit.available) { showToast('Набор недоступен', 'err'); return false; }
    const bad = kit.items.filter(i => effStock(i.vid) < i.qty * addQty).map(i => getV(i.vid)?.name);
    if (bad.length) { showToast('Нет в наличии: ' + bad.join(', '), 'err'); return false; }
    setCart(prev => {
      const existing = prev.find(c => c.type==='kit' && c.id===kit.id);
      if (existing) return prev.map(c => c===existing ? {...c, qty:c.qty+addQty} : c);
      return [...prev, { type:'kit', id:kit.id, name:kit.name, price:kit.price, qty:addQty, items:kit.items, imgs:kit.imgs }];
    });
    showToast('Набор «' + kit.name + '» добавлен' + (addQty > 1 ? ' (×' + addQty + ')' : ''));
    return true;
  };

  const updQty = (id, d) => setCart(prev => prev.map(c => {
    if (c.id!==id) return c;
    const nq = c.qty+d;
    if (nq<1) return c;
    if (d > 0) {
      if (c.type==='kit') {
        const k = getK(id);
        const out = k?.items.find(i => effStock(i.vid) < i.qty * d);
        if (out) { showToast('Недостаточно остатка', 'warn'); return c; }
      } else {
        if (d > effStock(id)) { showToast('Недостаточно остатка', 'warn'); return c; }
      }
    }
    return {...c, qty:nq};
  }));

  const removeItem = id => setCart(prev => prev.filter(c => c.id!==id));

  const requireAuth = cb => {
    if (user) { cb(); return; }
    setAuthCb(() => cb);
    setAuthOpen(true);
  };

  const login = email => {
    setUser({ email, name: email.split('@')[0] });
    setAuthOpen(false);
    if (authCb) { authCb(); setAuthCb(null); }
  };

  const placeOrder = data => {
    // Simulate fast СДЭК API response: track number assigned within seconds
    const trackNum = 'CDEK' + Math.floor(Math.random()*900000000 + 100000000);
    const d = data.delivery || {};
    const o = {
      id: 'ORD-' + Date.now(),
      date: new Date().toISOString().slice(0,10),
      items: cart.map(c => ({ vid:c.id, qty:c.qty, name:c.name, price:c.price })),
      total: data.total, delivCost: data.delivCost,
      delivery: d,
      address: d.address || '',
      payStatus:'paid', orderStatus:'shipping', delivStatus:'in_transit', tracking:trackNum,
    };
    setOrders(prev => [o, ...prev]);
    setCurOrder(o);
    setCart([]);
    return o;
  };

  /* Demo: advance order to the next status in flow */
  const advanceOrderStatus = (orderId) => {
    const flow = ['shipping','delivered'];
    setOrders(prev => prev.map(o => {
      if (o.id !== orderId) return o;
      const i = flow.indexOf(o.orderStatus);
      if (i < 0 || i >= flow.length-1) return o;
      const nextStatus = flow[i+1];
      const patch = { orderStatus: nextStatus };
      if (nextStatus === 'delivered') patch.delivStatus = 'delivered';
      return { ...o, ...patch };
    }));
  };

  return (
    <Ctx.Provider value={{ cart, cartCount, cartSubtotal, addToCart, addKitToCart, updQty, removeItem,
      user, login, logout:()=>setUser(null), requireAuth, authOpen, setAuthOpen,
      callbackOpen, setCallbackOpen,
      notifyProduct, setNotifyProduct,
      requestOpen, setRequestOpen,
      isAvailable, isKitAvailable,
      orders, placeOrder, advanceOrderStatus, curOrder, setCurOrder,
      toast, showToast, ts, setTs, effStock, PROMOS }}>
      {children}
    </Ctx.Provider>
  );
}
const useApp = () => useContext(Ctx);

/* ─── TOAST ─────────────────────────────────────────────────────────────── */
function Toast() {
  const { toast } = useApp();
  if (!toast) return null;
  const cls = { ok:'bg-green-600', err:'bg-red-600', warn:'bg-amber-500' };
  const ico  = { ok:'✓ ', err:'✗ ', warn:'⚠ ' };
  return (
    <div className={'fixed bottom-6 left-1/2 z-50 fade-in px-5 py-3 rounded-xl text-white text-sm font-semibold shadow-2xl ' + (cls[toast.type]||'bg-green-600')}
      style={{transform:'translateX(-50%)'}}>
      {ico[toast.type]||''}{toast.msg}
    </div>
  );
}

function AuthModal() {
  const { authOpen, setAuthOpen, login } = useApp();

  const [pass,  setPass]  = useState('');

  const submit = () => {
    if (!email||!pass) { setErr('Заполните все поля'); return; }

    login(email);
  };

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center fade-in" style={{background:'rgba(0,0,0,0.5)'}}
      onClick={() => setAuthOpen(false)}>

          <h2 className="text-2xl font-bold text-ink">Войдите в аккаунт</h2>

            className="w-8 h-8 rounded-full bg-gray-100 text-secondary flex items-center justify-center text-xl hover:bg-gray-200 transition-colors">×</button>
        </div>
        <div className="flex gap-6 mb-6 border-b border-gray-100">
          {['login','register'].map(t => (
            <button key={t} onClick={() => setTab(t)}
              className={'pb-3 text-sm font-semibold border-b-2 -mb-px transition-colors ' + (tab===t ? 'border-brand text-brand' : 'border-transparent text-gray-400 hover:text-gray-700')}>
              {t==='login' ? 'Войти' : 'Регистрация'}
            </button>
          ))}
        </div>
        <div className="space-y-4">
          <input type="email" placeholder="Email" value={email}
            onChange={e=>{setEmail(e.target.value);setErr('');}}
            className={'inp ' + (err?'inp-err':'')} />
          <input type="password" placeholder="Пароль" value={pass}
            onChange={e=>{setPass(e.target.value);setErr('');}}
            className={'inp ' + (err?'inp-err':'')} />
          {err && <p className="text-red-500 text-sm">{err}</p>}
          <button onClick={submit} className="btn-p w-full py-3 font-semibold text-sm">
            {tab==='login' ? 'Войти' : 'Создать аккаунт'}
          </button>
          <p className="text-xs text-secondary text-center">Корзина сохранится после входа</p>
        </div>
      </div>
    </div>
  );
}

function CallbackModal() {
  const { callbackOpen, setCallbackOpen, showToast } = useApp();
  const [name,  setName]  = useState('');
  const [phone, setPhone] = useState('');
  const [agree, setAgree] = useState(true);
  const [err,   setErr]   = useState({});
  const [sent,  setSent]  = useState(false);

  if (!callbackOpen) return null;

  const fmtPhone = v => {
    let d = v.replace(/\D/g,'');
    if (d.startsWith('8')) d = '7' + d.slice(1);
    if (!d.startsWith('7')) d = '7' + d;
    d = d.slice(0,11);
    let f = '+7';
    if (d.length>1) f += ' (' + d.slice(1,4);
    if (d.length>=4) f += ') ' + d.slice(4,7);
    if (d.length>=7) f += '-' + d.slice(7,9);
    if (d.length>=9) f += '-' + d.slice(9,11);
    return f;
  };

  const close = () => {
    setCallbackOpen(false);
    setTimeout(()=>{ setName(''); setPhone(''); setSent(false); setErr({}); }, 200);
  };

  const submit = () => {
    const e = {};
    if (!name.trim()) e.name = 'Введите имя';
    if (phone.replace(/\D/g,'').length < 11) e.phone = 'Введите телефон';
    if (!agree) e.agree = 'Необходимо согласие';
    setErr(e);

      setEmail(user.email);

    try {
      localStorage.removeItem('bioniq.cart');
      localStorage.removeItem('bioniq.user');
      localStorage.removeItem('bioniq.orders');
      window.location.reload();

  };
  return (
    <div className="fixed bottom-4 right-4 z-40">
      <button onClick={() => setOpen(o=>!o)}

          <p className="text-xs font-bold text-secondary uppercase tracking-wider mb-3">Переключатель состояний</p>

                <div className={'absolute top-0.5 w-4 h-4 bg-white rounded-full shadow transition-transform ' + (ts[k]?'translate-x-5':'translate-x-0.5')} />

  );

/* ─── VITAMIN CARD ───────────────────────────────────────────────────────── */
function VitCard({ v }) {
  const { addToCart, updQty, removeItem, effStock, cart, setNotifyProduct } = useApp();
  const history = useHistory();
  const s = effStock(v.id);
  const cartItem = cart.find(c => c.type==='vitamin' && c.id===v.id);
  const inCart = cartItem?.qty || 0;
  const [imgIdx, setImgIdx] = useState(0);
  const imgs = v.imgs || [];

  const handleAdd = e => {
    e.stopPropagation();
    addToCart({ id:v.id, type:'vitamin', name:v.name, price:v.price });
  };
  const handleInc = e => {
    e.stopPropagation();
    updQty(v.id, 1);
  };
  const handleDec = e => {
    e.stopPropagation();
    if (inCart <= 1) removeItem(v.id);
    else updQty(v.id, -1);
  };
  const handleGoCart = e => { e.stopPropagation(); history.push('/cart'); };
  const handleBuyNow = e => {
    e.stopPropagation();
    if (inCart > 0) { history.push('/checkout'); return; }
    if (addToCart({ id:v.id, type:'vitamin', name:v.name, price:v.price })) {
      history.push('/checkout');
    }
  };

  return (
    <div className="bg-white overflow-hidden card-hover cursor-pointer"
      onClick={() => history.push('/vitamins/'+v.id)}
      onMouseLeave={()=>setImgIdx(0)}>
      <div className="flex items-center justify-center relative overflow-hidden" style={{background:'#f4f2ee',aspectRatio:'4 / 5'}}>
        <img src={imgs[imgIdx]} alt={v.name} className="w-full h-full object-cover" style={{transition:'opacity .6s ease', filter: s===0 && inCart===0 ? 'grayscale(1) opacity(0.7)' : ''}} />
        {s===0 && inCart===0 && (
          <div className="absolute top-4 left-4 uppercase font-medium" style={{color:'rgba(0,0,0,0.54)',fontSize:'10px',letterSpacing:'0.12em'}}>
            Нет в наличии
          </div>
        )}
        {imgs.length > 1 && (
          <div className="absolute bottom-4 left-1/2 flex gap-1.5" style={{transform:'translateX(-50%)'}} onClick={e=>e.stopPropagation()}>
            {imgs.map((_, i) => (
              <button key={i}
                onMouseEnter={()=>setImgIdx(i)}
                onClick={()=>setImgIdx(i)}
                className="rounded-full transition-all"
                style={{
                  width: i===imgIdx ? '14px' : '6px',
                  height: '6px',
                  background: i===imgIdx ? '#042033' : 'rgba(0,0,0,0.18)',
                }}
                aria-label={'Фото '+(i+1)} />
            ))}
          </div>
        )}
      </div>
      <div className="pt-5">
        <h3 className="text-ink mb-1" style={{fontSize:'15px',fontWeight:500,letterSpacing:'-0.01em',lineHeight:1.3}}>{v.name}</h3>
        <p className="text-[12px] text-secondary mb-3">{v.sub}</p>
        <DietPills tags={v.diet} className="mb-3" />

/* ─── KIT CARD ───────────────────────────────────────────────────────────── */
function KitCard({ k }) {
  const { addKitToCart, updQty, removeItem, effStock, cart, setNotifyProduct } = useApp();
  const history = useHistory();
  const [imgIdx, setImgIdx] = useState(0);
  const imgs = k.imgs || [];
  const hasOOS = k.items.some(i => effStock(i.vid) < i.qty);
  const cartItem = cart.find(c => c.type==='kit' && c.id===k.id);
  const inCart = cartItem?.qty || 0;
  const canAddMore = !hasOOS;

  const handleAdd = e => {
    e.stopPropagation();
    addKitToCart(k, 1);
  };
  const handleInc = e => {
    e.stopPropagation();
    updQty(k.id, 1);
  };
  const handleDec = e => {
    e.stopPropagation();
    if (inCart <= 1) removeItem(k.id);
    else updQty(k.id, -1);
  };
  const handleGoCart = e => { e.stopPropagation(); history.push('/cart'); };
  const handleBuyNow = e => {
    e.stopPropagation();
    if (inCart > 0) { history.push('/checkout'); return; }
    if (addKitToCart(k, 1)) history.push('/checkout');
  };

  return (
    <div className="bg-white card-hover cursor-pointer h-full"
      onClick={() => history.push('/vitamin-kits/'+k.id)}
      onMouseLeave={()=>setImgIdx(0)}>
      <div className="flex items-center justify-center relative overflow-hidden" style={{background:'#f4f2ee',aspectRatio:'4 / 5'}}>
        <img src={imgs[imgIdx]} alt={k.name} className="w-full h-full object-cover" style={{transition:'opacity .6s ease', filter: hasOOS && inCart===0 ? 'grayscale(1) opacity(0.7)' : ''}} />
        {hasOOS && inCart===0 && (
          <div className="absolute top-4 left-4 uppercase font-medium" style={{color:'rgba(0,0,0,0.54)',fontSize:'10px',letterSpacing:'0.12em'}}>
            Нет в наличии
          </div>
        )}
        {imgs.length > 1 && (
          <div className="absolute bottom-4 left-1/2 flex gap-1.5" style={{transform:'translateX(-50%)'}} onClick={e=>e.stopPropagation()}>
            {imgs.map((_, i) => (
              <button key={i}
                onMouseEnter={()=>setImgIdx(i)}
                onClick={()=>setImgIdx(i)}
                className="rounded-full transition-all"
                style={{
                  width: i===imgIdx ? '14px' : '6px',
                  height: '6px',
                  background: i===imgIdx ? '#042033' : 'rgba(0,0,0,0.18)',
                }} />

          </div>
        )}
      </div>
      <div className="pt-5">
        <h3 className="text-ink mb-1" style={{fontSize:'15px',fontWeight:500,letterSpacing:'-0.01em'}}>{k.name}</h3>
        <p className="text-[12px] text-secondary mb-1" style={{lineHeight:1.4}}>{k.items.map(i => getV(i.vid)?.name).filter(Boolean).join(' · ')}</p>

/* ─── CART PAGE ──────────────────────────────────────────────────────────── */
function CartPage() {
  const { cart, updQty, removeItem, addToCart, effStock, requireAuth, PROMOS } = useApp();
  const history = useHistory();
  const [promoIn, setPromoIn] = useState('');
  const [promo,   setPromo]   = useState(null);
  const [promoErr, setPromoErr] = useState('');

  const subtotal = cart.reduce((s,i) => s+i.price*i.qty, 0);
  const discount = promo ? Math.round(subtotal*promo.pct/100) : 0;
  const total    = subtotal - discount;

  const applyPromo = () => {
    const pct = PROMOS[promoIn.toUpperCase()];
    if (pct) { setPromo({ code:promoIn.toUpperCase(), pct }); setPromoErr(''); }
    else { setPromoErr('Промокод не найден'); setPromo(null); }
  };


  if (cart.length===0) return (
    <div className="max-w-2xl mx-auto px-6 py-24 text-center fade-in">
      <div className="text-6xl mb-6">🛒</div>
      <h2 className="text-2xl font-bold text-ink mb-3">Корзина пуста</h2>
      <p className="text-secondary mb-8">Добавьте витамины или наборы, чтобы продолжить</p>
      <Link to="/vitamins" className="btn-p px-8 py-3 font-semibold text-sm">Смотреть все витамины</Link>

  );

  return (
    <div className="max-w-[1280px] mx-auto px-8 py-8 fade-in">
      <div className="mb-12">
        <h1 className="display text-ink" style={{fontSize:'56px',lineHeight:1}}>Корзина <span className="text-disabled num" style={{fontSize:'24px',fontFamily:'inherit'}}>{cart.length} поз.</span></h1>

      <div className="grid lg:grid-cols-3 gap-8">
        <div className="lg:col-span-2 space-y-3">
          {cart.map(item => {
            const isKit = item.type === 'kit';
            const s = isKit ? Infinity : effStock(item.id);
            const vv = isKit ? null : getV(item.id);
            const photo = isKit ? (item.imgs||[])[0] : vv?.imgs?.[0];
            const subline = isKit
              ? 'В наборе: ' + item.items.map(i => getV(i.vid)?.name).join(', ')
              : fmt(item.price) + ' за штуку';
            return (
              <div key={item.id} className="bg-white rounded-2xl p-4 flex gap-4 border border-gray-100 relative">
                <button onClick={()=>removeItem(item.id)} aria-label="Удалить" title="Удалить"
                  className="absolute top-3 right-3 w-7 h-7 rounded-full flex items-center justify-center transition-colors text-disabled hover:text-ink hover:bg-gray-100">
                  <svg width="13" height="13" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6l-12 12"/></svg>
                </button>
                <div className="w-20 h-20 rounded-xl flex items-center justify-center p-2 flex-shrink-0 relative overflow-hidden" style={{background:'#f4f2ee'}}>
                  {photo && <img src={photo} alt={item.name} className="max-h-full max-w-full object-contain" />}

                </div>
                <div className="flex-1 min-w-0 pr-8">
                  <h3 className="font-semibold text-ink text-sm mb-0.5">{item.name}</h3>
                  <p className="text-secondary text-xs mb-2 truncate">{subline}</p>

                  <div className="flex items-center gap-3">
                    <div className="flex items-center border border-gray-200 rounded-lg overflow-hidden bg-white">

                    <button onClick={applyPromo} className="px-4 text-[13px] rounded-lg transition-colors" style={{background:'#E5EDF2',color:'#042033',fontWeight:500}}>Применить</button>
                  </div>
                  {promoErr && <p className="text-red-500 text-xs mt-2">{promoErr}</p>}
                </>
              ) : (
                <div className="flex items-center justify-between">
                  <div className="flex items-center gap-2 text-[13px] text-ink">
                    <svg width="14" height="14" fill="none" stroke="#042033" strokeWidth="2" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
                    <span className="num">{promo.code}</span>
                    <span className="text-secondary">· −{promo.pct}%</span>
                  </div>
                  <button onClick={()=>{setPromo(null);setPromoIn('');}} className="text-[12px] text-disabled hover:text-ink transition-colors">отменить</button>
                </div>
              )}
            </div>

            <div className="pt-4 mb-6" style={{borderTop:'1px solid rgba(4,32,51,0.08)'}}>
              <div className="flex justify-between font-bold text-ink text-lg"><span>К оплате</span><span className="num">{fmt(total)}</span></div>
            </div>
            <button onClick={() => requireAuth(() => history.push('/checkout', { discount, promo }))}
              className="btn-p w-full py-4 font-bold text-base">Оформить заказ →</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── CDEK WIDGET MOCK ───────────────────────────────────────────────────── */
function CdekWidget({ selected, onChoose, cartWeight=0.3 }) {
  const [cityId, setCityId] = useState('msk');
  const [search, setSearch] = useState('');
  const [filters, setFilters] = useState({ cash:false, fitting:false, postamat:false });
  const [hoverId, setHoverId] = useState(null);
  const [openId,  setOpenId]  = useState(selected?.id || null);

  const city = CITIES.find(c => c.id === cityId);
  const cityPoints = PVZ.filter(p => p.city === cityId);

  const filtered = cityPoints.filter(p => {
    if (filters.cash     && !p.cash) return false;
    if (filters.fitting  && !p.fitting) return false;
    if (filters.postamat && p.type !== 'postamat') return false;
    if (search) {
      const q = search.toLowerCase();
      if (!p.name.toLowerCase().includes(q) && !p.addr.toLowerCase().includes(q)) return false;
    }
    return true;
  });

  const opened = filtered.find(p => p.id === openId) || filtered[0];

  // Псевдо-расчёт цены/срока на основе города и веса
  const calcPrice = (p) => {
    const base = { msk: 0, spb: 200, ekb: 350, nsk: 450, kzn: 290 }[p.city] || 350;
    const weightAdj = Math.round(cartWeight * 50);
    return p.type === 'postamat' ? base + weightAdj : base + weightAdj + 30;
  };
  const calcDays = (p) => ({ msk:'1–2 дня', spb:'2–3 дня', ekb:'3–4 дня', nsk:'4–5 дней', kzn:'2–3 дня' }[p.city]);

  return (
    <div className="overflow-hidden" style={{border:'1px solid rgba(4,32,51,0.12)',borderRadius:'14px',background:'#fff'}}>
      {/* Toolbar */}
      <div className="flex items-center gap-3 p-3 flex-wrap" style={{borderBottom:'1px solid rgba(4,32,51,0.08)',background:'#fafafa'}}>
        <span className="text-[11px] uppercase tracking-[0.15em] text-secondary px-2" style={{fontWeight:500}}>СДЭК</span>
        {/* City selector */}
        <div className="relative">
          <select value={cityId} onChange={e=>{setCityId(e.target.value);setOpenId(null);}}
            className="text-[13px] py-2 px-3 pr-8 rounded-lg appearance-none cursor-pointer" style={{background:'#fff',border:'1px solid rgba(4,32,51,0.15)'}}>
            {CITIES.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
          <svg className="absolute right-2 top-1/2 -translate-y-1/2 pointer-events-none" width="12" height="12" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
        </div>
        {/* Search */}
        <div className="relative flex-1 min-w-[180px]">
          <svg className="absolute left-3 top-1/2 -translate-y-1/2 text-disabled" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.3-4.3"/></svg>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Поиск по адресу или названию"
            className="w-full text-[13px] py-2 pl-9 pr-3 rounded-lg" style={{background:'#fff',border:'1px solid rgba(4,32,51,0.15)'}} />
        </div>
        {/* Filters */}
        <div className="flex gap-1.5">
          {[
            { k:'postamat', l:'Постаматы' },
            { k:'cash',     l:'Наличные' },
            { k:'fitting',  l:'Примерочная' },
          ].map(f => (
            <button key={f.k} onClick={()=>setFilters(F=>({...F,[f.k]:!F[f.k]}))}
              className={'text-[12px] px-3 py-1.5 rounded-full transition-all ' + (filters[f.k]?'text-white':'text-secondary hover:text-ink')}
              style={filters[f.k]?{background:'#042033'}:{border:'1px solid rgba(4,32,51,0.12)'}}>
              {f.l}
            </button>
          ))}
        </div>
      </div>

      {/* Map + list */}
      <div className="grid md:grid-cols-[1fr_320px]" style={{minHeight:'420px'}}>
        {/* Map */}
        <div className="relative overflow-hidden" style={{background:'#eef2f4',backgroundImage:'linear-gradient(rgba(4,32,51,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(4,32,51,0.04) 1px, transparent 1px)',backgroundSize:'40px 40px'}}>
          {/* Fake roads */}
          <svg viewBox="0 0 100 100" preserveAspectRatio="none" className="absolute inset-0 w-full h-full">
            <path d="M 0 50 Q 30 30 60 50 T 100 45" fill="none" stroke="#d4dde2" strokeWidth="0.6" />
            <path d="M 50 0 Q 45 30 55 60 T 50 100" fill="none" stroke="#d4dde2" strokeWidth="0.6" />
            <path d="M 0 30 L 100 70" stroke="#d4dde2" strokeWidth="0.4" />
            <path d="M 0 70 L 100 30" stroke="#d4dde2" strokeWidth="0.4" />
            <circle cx="50" cy="50" r="22" fill="none" stroke="#d4dde2" strokeWidth="0.4" strokeDasharray="0.8 1.2" />
          </svg>
          <div className="absolute top-3 left-3 text-[11px] uppercase tracking-[0.15em] text-secondary px-2 py-1 rounded" style={{background:'rgba(255,255,255,0.85)',fontWeight:500}}>
            {city.full}
          </div>
          {/* Pins */}
          {filtered.map(p => {
            const isOpen = opened?.id === p.id;
            const isHover = hoverId === p.id;
            return (
              <button key={p.id}
                onClick={()=>setOpenId(p.id)}
                onMouseEnter={()=>setHoverId(p.id)}
                onMouseLeave={()=>setHoverId(null)}
                className="absolute transition-all"
                style={{
                  left: `${p.x}%`,
                  top: `${p.y}%`,
                  transform: `translate(-50%, -100%) scale(${isOpen||isHover?1.15:1})`,
                  zIndex: isOpen?10:1,
                }} aria-label={p.name}>
                <svg width="28" height="36" viewBox="0 0 28 36" fill="none">

                </svg>
              </button>
            );
          })}
          {filtered.length === 0 && (
            <div className="absolute inset-0 flex items-center justify-center text-secondary text-[13px]">
              Под фильтр ничего не нашлось
            </div>
          )}
          {/* Map controls (decorative) */}
          <div className="absolute right-3 top-3 flex flex-col gap-px overflow-hidden" style={{borderRadius:'6px',border:'1px solid rgba(4,32,51,0.12)',background:'rgba(4,32,51,0.08)'}}>
            <button className="w-8 h-8 bg-white text-ink text-lg leading-none" aria-label="Приблизить">+</button>
            <button className="w-8 h-8 bg-white text-ink text-lg leading-none" aria-label="Отдалить">−</button>
          </div>
        </div>

        {/* List */}
        <div className="overflow-y-auto" style={{maxHeight:'420px',borderLeft:'1px solid rgba(4,32,51,0.08)'}}>
          {filtered.map(p => {
            const isOpen = opened?.id === p.id;
            return (
              <div key={p.id} onClick={()=>setOpenId(p.id)}

                  borderBottom:'1px solid rgba(4,32,51,0.06)',

                </div>
                <p className="text-[12px] text-secondary mb-2 leading-snug">{p.addr}</p>
                <div className="flex items-center justify-between">
                  <span className="text-[11px] text-disabled">{p.h.split(' · ')[0]}</span>
                  <span className="text-[12px] text-ink num">от {fmt(calcPrice(p))}</span>
                </div>
                {isOpen && (
                  <div className="mt-3 pt-3" style={{borderTop:'1px solid rgba(4,32,51,0.08)'}}>
                    <div className="flex items-center gap-3 text-[11px] text-secondary mb-3 flex-wrap">
                      {p.cash    && <span className="flex items-center gap-1"><svg width="11" height="11" fill="none" stroke="currentColor" strokeWidth="1.8" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>Наличные</span>}
                      {p.card    && <span className="flex items-center gap-1"><svg width="11" height="11" fill="none" stroke="currentColor" strokeWidth="1.8" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>Картой</span>}
                      {p.fitting && <span className="flex items-center gap-1"><svg width="11" height="11" fill="none" stroke="currentColor" strokeWidth="1.8" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>Примерочная</span>}
                    </div>
                    <div className="flex items-center justify-between text-[12px] mb-3">
                      <span className="text-secondary">Срок</span>
                      <span className="text-ink">{calcDays(p)}</span>
                    </div>
                    {p.phone && <p className="text-[11px] text-disabled mb-3">{p.phone}</p>}
                    <button onClick={(e)=>{e.stopPropagation();onChoose({...p, price:calcPrice(p), days:calcDays(p)});}}

            );
          })}
        </div>
      </div>
    </div>
  );

/* ─── CHECKOUT PAGE ──────────────────────────────────────────────────────── */
function CheckoutPage() {
  const { cart, user, requireAuth, ts, showToast } = useApp();
  const history  = useHistory();
  const location = useLocation();
  const { discount=0, promo=null } = location.state || {};
  const [delType, setDelType] = useState('');
  const [pvz,    setPvz]     = useState(null);
  const [addr,   setAddr]    = useState('');
  const [pvzOpen,setPvzOpen] = useState(false);
  const [payM,   setPayM]    = useState('card');
  const [errs,   setErrs]    = useState({});

  useEffect(() => { if (!user) requireAuth(()=>{}); }, []);
  if (cart.length===0) { history.push('/cart'); return null; }

  const subtotal  = cart.reduce((s,i)=>s+i.price*i.qty,0) - discount;
  const delivCost = !delType ? null
    : delType === 'pvz' ? (pvz?.price ?? null)
    : (DELIVERY_OPTS.find(d=>d.id===delType)?.price ?? 0);
  const total     = subtotal + (delivCost||0);

  const validate = () => {
    const e={};
    if (!delType) e.del='Выберите способ доставки';
    if (delType==='pvz' && !pvz) e.pvz='Выберите пункт выдачи';
    if ((delType==='courier' || delType==='express') && !addr) e.addr='Введите адрес доставки';
    return e;
  };

  const submit = () => {
    const e=validate();
    if (Object.keys(e).length) {
      setErrs(e);
      // Surface the first error so the user knows why nothing happened
      const firstMsg = e.del || e.pvz || e.addr;
      if (firstMsg) showToast(firstMsg, 'err');
      return;
    }
    const opt = DELIVERY_OPTS.find(d=>d.id===delType);
    const delivery = delType === 'pvz'
      ? { type:'pvz',     label:'Пункт выдачи СДЭК', name:pvz?.name, address:pvz?.addr, hours:pvz?.h, days: pvz?.days }
      : { type:delType,   label:opt?.label || '',    address:addr,                                    days: opt?.days };
    history.push('/payment', { total, delivCost, delivery, payM, discount, promo });
  };

  const activeDelivCls  = 'border-2 bg-white';
  const inactiveDelivCls = 'border-2 border-gray-100 hover:border-gray-200';

  return (
    <div className="max-w-[1280px] mx-auto px-8 py-8 fade-in">
      <div className="mb-12">
        <h1 className="display text-ink" style={{fontSize:'56px',lineHeight:1}}>Оформление заказа</h1>
      </div>
      <div className="grid lg:grid-cols-3 gap-8">
        <div className="lg:col-span-2 space-y-6">
          <div className="bg-white rounded-2xl p-6 border border-gray-100">
            <h2 className="font-bold text-ink mb-4">Доставка</h2>
            {ts.delivErr && (
              <div className="bg-orange-50 border border-orange-200 rounded-xl p-3 mb-4 text-sm text-orange-700">
                ⚠ Не удалось рассчитать стоимость. Цена будет уточнена оператором.
              </div>
            )}
            <div className="space-y-3 mb-4">
              {DELIVERY_OPTS.map(opt => (
                <label key={opt.id}
                  className={'flex items-center gap-4 p-4 rounded-xl cursor-pointer transition-all ' + (delType===opt.id ? activeDelivCls : inactiveDelivCls)}
                  style={delType===opt.id ? {borderColor:'#042033', background:'#E5EDF2'} : {}}
                  onClick={()=>{setDelType(opt.id);setErrs(e=>({...e,del:null}));}}>
                  <div className={'w-5 h-5 rounded-full border-2 flex items-center justify-center flex-shrink-0 ' + (delType===opt.id?'':'border-gray-300')}
                    style={delType===opt.id ? {borderColor:'#042033'} : {}}>
                    {delType===opt.id && <div className="w-2.5 h-2.5 rounded-full" style={{background:'#042033'}} />}
                  </div>
                  <div className="flex-1">
                    <p className="font-medium text-ink text-sm">{opt.label} <span className="text-secondary font-normal">· {opt.sub}</span></p>
                    <p className="text-xs text-secondary mt-0.5">{opt.days}</p>
                  </div>
                  <span className="font-semibold text-ink text-sm num">{opt.id==='pvz' ? 'от 0 ₽' : opt.price===0?'Бесплатно':fmt(opt.price)}</span>
                </label>
              ))}
            </div>
            {errs.del && <p className="text-red-500 text-xs mb-2">{errs.del}</p>}

            {delType==='pvz' && (
              <div className="mt-4">
                <CdekWidget selected={pvz} onChoose={p=>{setPvz(p);setErrs(e=>({...e,pvz:null}));}} cartWeight={cart.reduce((s,i)=>s+0.15*i.qty,0)} />
                {pvz && (
                  <div className="mt-3 p-4 rounded-xl flex items-start gap-3" style={{background:'#E5EDF2'}}>
                    <svg width="18" height="18" fill="none" stroke="#042033" strokeWidth="2" viewBox="0 0 24 24" className="flex-shrink-0 mt-0.5"><path d="M20 6L9 17l-5-5"/></svg>
                    <div className="flex-1">
                      <p className="text-ink text-[14px]" style={{fontWeight:500}}>{pvz.name}</p>
                      <p className="text-secondary text-[12px] mt-0.5">{pvz.addr} · {pvz.h.split(' · ')[0]}</p>
                      <p className="text-secondary text-[12px] mt-0.5 num">Доставка от {fmt(pvz.price)} · {pvz.days}</p>
                    </div>
                  </div>
                )}
                {errs.pvz && <p className="text-red-500 text-xs mt-2">{errs.pvz}</p>}
              </div>
            )}
            {(delType==='courier' || delType==='express') && (
              <div className="mt-2">
                <input value={addr} onChange={e=>{setAddr(e.target.value);setErrs(er=>({...er,addr:null}));}}
                  placeholder={delType==='express' ? 'Москва, улица, дом, квартира' : 'Город, улица, дом, квартира'} className={'inp ' + (errs.addr?'inp-err':'')} />
                {errs.addr && <p className="text-red-500 text-xs mt-1">{errs.addr}</p>}
              </div>
            )}
          </div>

          <div className="bg-white rounded-2xl p-6 border border-gray-100">
            <h2 className="font-bold text-ink mb-4">Способ оплаты</h2>
            <div className="space-y-3">
              {PAY_METHODS.map(m => (
                <label key={m.id}
                  className={'flex items-center gap-4 p-4 rounded-xl cursor-pointer transition-all border-2 ' + (payM===m.id ? '' : 'border-gray-100 hover:border-gray-200')}
                  style={payM===m.id ? {borderColor:'#042033', background:'#E5EDF2'} : {}}
                  onClick={()=>setPayM(m.id)}>
                  <div className={'w-5 h-5 rounded-full border-2 flex items-center justify-center flex-shrink-0 ' + (payM===m.id?'':'border-gray-300')}
                    style={payM===m.id ? {borderColor:'#042033'} : {}}>
                    {payM===m.id && <div className="w-2.5 h-2.5 rounded-full" style={{background:'#042033'}} />}
                  </div>
                  <div className="flex-1">
                    <p className="font-medium text-ink text-sm">{m.label}</p>
                    {m.sub && <p className="text-xs text-secondary mt-0.5">{m.sub}</p>}
                  </div>
                  {m.id==='split' && total>0 && (
                    <span className="text-[12px] num text-secondary">по {fmt(Math.round(total/4))}</span>
                  )}
                </label>
              ))}
            </div>
          </div>

        </div>

        <div className="sticky top-20">
          <div className="bg-white rounded-2xl p-6 border border-gray-100">
            <h2 className="font-bold text-ink text-lg mb-4">Ваш заказ</h2>
            <div className="space-y-2 text-sm mb-4">
              {cart.map(i=><div key={i.id} className="flex justify-between"><span className="text-secondary truncate mr-2">{i.name} ×{i.qty}</span><span className="num">{fmt(i.price*i.qty)}</span></div>)}
            </div>
            <div className="border-t border-gray-100 pt-3 space-y-2 text-sm">
              <div className="flex justify-between"><span className="text-secondary">Товары</span><span className="num">{fmt(cart.reduce((s,i)=>s+i.price*i.qty,0))}</span></div>
              {discount>0 && <div className="flex justify-between" style={{color:'#042033'}}><span>Скидка</span><span className="num">−{fmt(discount)}</span></div>}
              <div className="flex justify-between">
                <span className="text-secondary">Доставка</span>
                <span className="num">{delivCost===null?'—':delivCost===0?'Бесплатно':fmt(delivCost)}</span>
              </div>
            </div>
            <div className="border-t border-gray-100 mt-3 pt-3 mb-6">
              <div className="flex justify-between font-bold text-ink text-lg"><span>Итого</span><span className="num">{fmt(total)}</span></div>
            </div>
            <button onClick={submit} className="btn-p w-full py-4 font-bold text-base">Оплатить {fmt(total)}</button>
            <p className="text-[11px] text-disabled mt-3 leading-relaxed">
              Нажимая «Оплатить», вы принимаете условия <a href="#" onClick={e=>e.preventDefault()} className="underline hover:text-secondary">публичной оферты</a>.
            </p>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── PAYMENT PAGE ───────────────────────────────────────────────────────── */
function PaymentPage() {
  const { placeOrder, ts, cart } = useApp();
  const history  = useHistory();
  const location = useLocation();
  const state = location.state || {};
  // Fallback: if state lost (refresh, etc), compute from cart so user can still pay
  const cartTotal = cart.reduce((s,i)=>s+i.price*i.qty,0);
  const total     = state.total     ?? cartTotal;
  const delivCost = state.delivCost ?? 0;
  const delivery  = state.delivery  ?? null;
  const payM      = state.payM      ?? 'card';
  const [card, setCard] = useState('');
  const [exp,  setExp]  = useState('');
  const [cvv,  setCvv]  = useState('');
  const [loading, setLoading] = useState(false);

  // If user really has nothing — empty cart AND no state — bounce to cart
  if (!total && cart.length===0) { history.push('/cart'); return null; }

  const fmtCard = v => v.replace(/\D/g,'').slice(0,16).replace(/(\d{4})(?=\d)/g,'$1 ');
  const fmtExp  = v => { const d=v.replace(/\D/g,''); return d.length>=2?d.slice(0,2)+'/'+d.slice(2,4):d; };

  const pay = () => {
    if (loading) return;
    setLoading(true);
    setTimeout(() => {
      setLoading(false);
      try {
        if (ts.payFail) {
          history.push('/order-failed', { total, reason:'Отклонено банком' });
          return;
        }
        const order = placeOrder({ total, delivCost, delivery });
        history.push('/order-success', { order });
      } catch (err) {
        console.error('Payment error:', err);
        history.push('/order-success');
      }
    }, 800);
  };

  const method = PAY_METHODS.find(m=>m.id===payM) || PAY_METHODS[0];

  return (
    <div className="min-h-screen flex items-center justify-center px-4 fade-in" style={{background:'#fafafa'}}>
      <div className="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
        <div className="text-center mb-8">
          <p className="text-[11px] uppercase tracking-[0.15em] text-secondary mb-3">{method.label}</p>
          <h1 className="display text-ink mb-2" style={{fontSize:'32px',lineHeight:1}}>Оплата заказа</h1>
          <p className="num" style={{fontSize:'36px',fontWeight:500,letterSpacing:'-0.02em',color:'#042033'}}>{fmt(total)}</p>
        </div>

        {payM==='card' && (
          <div className="space-y-4 mb-6">
            <div>
              <label className="text-xs text-secondary font-medium block mb-1">Номер карты</label>
              <input value={card} onChange={e=>setCard(fmtCard(e.target.value))} placeholder="0000 0000 0000 0000"

            </svg>
          </div>
          <p className="text-[11px] uppercase tracking-[0.2em] text-secondary mb-3">Оплата прошла успешно</p>

          <>

              <p className="text-[11px] uppercase tracking-[0.15em] text-secondary mb-3">Состав заказа</p>
              <div className="space-y-2 mb-3">
                {order.items.map((i,n) => (
                  <div key={n} className="flex justify-between text-[14px]">
                    <span className="text-ink">{i.name} <span className="text-secondary">×{i.qty}</span></span>
                    <span className="text-ink num">{fmt(i.price*i.qty)}</span>
                  </div>
                ))}
              </div>
              <div className="flex justify-between text-ink pt-3" style={{borderTop:'1px solid rgba(4,32,51,0.08)',fontWeight:500}}>
                <span>Итого</span><span className="num">{fmt(order.total)}</span>
              </div>
            </div>

            <div className="mb-6 pt-6" style={{borderTop:'1px solid rgba(4,32,51,0.08)'}}>
              <p className="text-[11px] uppercase tracking-[0.15em] text-secondary mb-3">Доставка</p>
              {(() => {
                const m = (d.days || '').match(/(\d+)[\s\S]*?(\d+)?/);
                let eta = '';
                if (m) {
                  const base = order.date ? new Date(order.date) : new Date();
                  const min = parseInt(m[1],10);
                  const max = m[2] ? parseInt(m[2],10) : min;
                  const d1 = new Date(base); d1.setDate(d1.getDate()+min);
                  const d2 = new Date(base); d2.setDate(d2.getDate()+max);
                  const fmtD = dt => dt.getDate()+' '+RU_MONTHS[dt.getMonth()];
                  eta = (min===max) ? fmtD(d1) : (fmtD(d1)+' – '+fmtD(d2));
                } else if ((d.days||'').includes('сегодня')) {
                  eta = 'сегодня';
                }
                return eta ? <p className="text-ink text-[16px] mb-3" style={{fontWeight:500,letterSpacing:'-0.005em'}}>Ожидаем {eta}</p> : null;
              })()}
              {d.label && <p className="text-ink text-[14px] mb-1" style={{fontWeight:500}}>{d.label}</p>}
              {d.name && <p className="text-ink text-[14px]">{d.name}</p>}
              {d.address && <p className="text-secondary text-[13px] leading-relaxed">{d.address}</p>}
              {d.hours && <p className="text-disabled text-[12px] mt-1">{d.hours.split(' · ')[0]}</p>}
              {!d.label && !d.address && <p className="text-disabled text-[13px]">Уточним при подтверждении заказа</p>}
            </div>

            {order.tracking && (
              <div className="mb-6 pt-6" style={{borderTop:'1px solid rgba(4,32,51,0.08)'}}>
                <p className="text-[11px] uppercase tracking-[0.15em] text-secondary mb-2">Трек-номер СДЭК</p>
                <div className="flex items-baseline justify-between gap-3 flex-wrap">
                  <p className="num text-ink text-[15px]" style={{fontWeight:500,letterSpacing:'0.03em'}}>{order.tracking}</p>
                  <a href={'https://www.cdek.ru/ru/tracking?order_id=' + encodeURIComponent(order.tracking)} target="_blank" rel="noopener noreferrer"
                    className="text-[13px] text-ink inline-flex items-center gap-1.5 hover:gap-2 transition-all" style={{fontWeight:500}}>
                    Отследить на cdek.ru
                    <svg width="12" height="12" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><path d="M15 3h6v6M10 14L21 3"/></svg>
                  </a>
                </div>
                <p className="text-disabled text-[12px] mt-2">Продублировали в SMS</p>
              </div>
            )}
          </>
        )}

        <div className="space-y-2 mt-8">
          <button onClick={()=>history.push(order ? '/account/orders/'+order.id : '/account/orders')} className="btn-p w-full py-3 text-[14px]" style={{fontWeight:500}}>Отслеживать заказ →</button>
          <button onClick={()=>history.push('/vitamins')} className="w-full py-3 text-[14px] text-secondary hover:text-ink transition-colors" style={{fontWeight:500}}>Вернуться в магазин</button>
        </div>
      </div>
    </div>
  );
}

  const st  = ORDER_STATUS[o.orderStatus]  || ORDER_STATUS.processing;
  const dst = DELIV_STATUS[o.delivStatus] || DELIV_STATUS.pending;
  const stepIdx = ORDER_STEPS.findIndex(s=>s.key===o.orderStatus);

  const repeat = () => {
    o.items.forEach(i => {

      addToCart({ id:i.vid, type:'vitamin', name:i.name, price:i.price, stock:s, qty:i.qty });

    history.push('/cart');

  const submitReview = (vid, rating, text) => {
    setReviews(prev => ({ ...prev, [vid]: { rating, text, submitted:true } }));

  };

  return (
    <div className="max-w-2xl mx-auto px-6 py-10">

          <h2 className="text-ink num" style={{fontSize:'22px',fontWeight:500,letterSpacing:'-0.005em'}}>№ {o.id}</h2>

      </div>

      <div className="bg-white rounded-2xl p-5 border border-gray-100 mb-4">
        <h3 className="font-semibold text-ink mb-4">Доставка</h3>
        {(() => {
          // Normalize delivery info — provide sensible defaults so something always renders
          const od = o.delivery || {};
          const label   = od.label   || 'Доставка СДЭК';
          const name    = od.name    || '';
          const address = od.address || o.address || '';
          const hours   = od.hours   || '';
          const daysStr = od.days    || '2–3 дня';

          // ETA: parse two-number range from daysStr (e.g. '1–2', '2-3', '4 дня')
          let eta = '';
          if (/сегодня/i.test(daysStr)) {
            eta = 'сегодня';
          } else {
            const nums = (daysStr.match(/\d+/g) || []).map(n => parseInt(n,10));
            if (nums.length > 0) {
              const min = nums[0];
              const max = nums.length > 1 ? nums[1] : min;
              const base = o.date ? new Date(o.date) : new Date();
              const d1 = new Date(base); d1.setDate(d1.getDate()+min);
              const d2 = new Date(base); d2.setDate(d2.getDate()+max);
              const fmtD = dt => dt.getDate()+' '+RU_MONTHS[dt.getMonth()];
              eta = (min===max) ? fmtD(d1) : (fmtD(d1)+' – '+fmtD(d2));
            }
          }

          return (
            <>
              {eta && (
                <div className="mb-4 pb-4" style={{borderBottom:'1px solid rgba(4,32,51,0.06)'}}>
                  <p className="text-[11px] uppercase tracking-[0.1em] text-secondary mb-1">Ожидаемая дата</p>
                  <p className="text-ink" style={{fontSize:'17px',fontWeight:500,letterSpacing:'-0.005em'}}>{eta}</p>
                </div>
              )}
              <div className="text-sm">
                <p className="text-[11px] uppercase tracking-[0.1em] text-secondary mb-1">Куда доставим</p>
                <p className="text-ink" style={{fontWeight:500}}>{label}</p>
                {name && <p className="text-ink mt-1">{name}</p>}
                {address && <p className="text-secondary mt-1">{address}</p>}
                {!address && !name && <p className="text-disabled mt-1">Уточняется</p>}
                {hours && <p className="text-disabled text-xs mt-1">{hours.split(' · ')[0]}</p>}
              </div>
            </>
          );
        })()}
        {o.tracking && (
          <div className="mt-4 pt-4" style={{borderTop:'1px solid rgba(4,32,51,0.06)'}}>
            <p className="text-[11px] uppercase tracking-[0.1em] text-secondary mb-1">Трек-номер СДЭК</p>
            <div className="flex items-center justify-between gap-3 flex-wrap">
              <span className="num text-ink text-sm" style={{fontWeight:500,letterSpacing:'0.02em'}}>{o.tracking}</span>
              <a href={'https://www.cdek.ru/ru/tracking?order_id=' + encodeURIComponent(o.tracking)} target="_blank" rel="noopener noreferrer"
                className="text-[13px] text-ink inline-flex items-center gap-1.5 hover:gap-2 transition-all" style={{fontWeight:500}}>
                Отследить в СДЭК
                <svg width="12" height="12" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><path d="M15 3h6v6M10 14L21 3"/></svg>
              </a>
            </div>
          </div>
        )}
      </div>

      <div className="bg-white rounded-2xl p-5 border border-gray-100 mb-4">
        <h3 className="font-semibold text-ink mb-3">Состав заказа</h3>
        {o.items.map((i,n) => {
          const vv = getV(i.vid);
          const img = vv?.imgs?.[0];
          const clickable = !!vv;
          return (
            <div key={n}
              className={'flex items-center gap-3 py-3 border-b border-gray-50 last:border-0 ' + (clickable ? 'cursor-pointer group' : '')}
              onClick={clickable ? () => history.push('/vitamins/'+i.vid) : undefined}>
              <div className="w-12 h-12 rounded-xl flex items-center justify-center overflow-hidden flex-shrink-0" style={{background:'#f4f2ee'}}>
                {img && <img src={img} alt={i.name} className="w-full h-full object-cover" />}
              </div>
              <div className="flex-1 min-w-0">
                <p className={'text-ink text-sm ' + (clickable ? 'group-hover:underline' : '')} style={{fontWeight:500}}>{i.name}</p>
                <p className="text-secondary text-xs num">×{i.qty}</p>
              </div>
              <span className="text-ink text-sm num" style={{fontWeight:500}}>{fmt(i.price*i.qty)}</span>
              {clickable && (
                <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24" className="text-disabled group-hover:text-secondary flex-shrink-0"><path d="M9 18l6-6-6-6"/></svg>
              )}
            </div>
          );
        })}
        <div className="flex justify-between text-ink pt-3 border-t border-gray-100 mt-1" style={{fontWeight:500}}>
          <span>Итого</span><span className="num">{fmt(o.total)}</span>
        </div>
      </div>

      {o.orderStatus === 'delivered' && (
        <div className="bg-white rounded-2xl p-5 border border-gray-100 mb-4">
          <div className="flex items-center justify-between mb-1">
            <h3 className="font-semibold text-ink">Оценить покупки</h3>
            <span className="text-[11px] uppercase tracking-wider text-secondary">Доставлен</span>
          </div>
          <p className="text-secondary text-sm mb-2">Поставьте оценку и оставьте отзыв — это поможет другим покупателям.</p>
          {o.items.map(item => (
            <ReviewItemForm key={item.vid} item={item}
              review={reviews[item.vid]}
              onSubmit={(rating, text) => submitReview(item.vid, rating, text)} />
          ))}
        </div>
      )}

      <button onClick={repeat} className="btn-p w-full py-3 text-sm" style={{fontWeight:500}}>Повторить заказ</button>
    </div>
  );
}

/* ─── APP ────────────────────────────────────────────────────────────────── */
function App() {
  return (
    <AppProvider>
      <HashRouter>
        <ScrollToTop />
        <Header />
        <main style={{minHeight:'calc(100vh - 64px)'}}>
          <Switch>
            <Route exact path="/" component={HomePage} />
            <Route exact path="/vitamins" component={VitaminsPage} />
            <Route exact path="/vitamins/:id" component={VitaminDetail} />
            <Route exact path="/checkups" component={CheckupsPage} />
            <Route exact path="/checkups/:id" component={CheckupDetail} />
            <Route exact path="/vitamin-kits/:id" component={KitDetail} />
            <Route exact path="/cart" component={CartPage} />
            <Route exact path="/checkout" component={CheckoutPage} />
            <Route exact path="/payment" component={PaymentPage} />
            <Route exact path="/order-success" component={OrderSuccess} />
            <Route exact path="/order-failed" component={OrderFailed} />
            <Route path="/account" render={() => (
              <AccountLayout>
                <Switch>
                  <Route exact path="/account" render={() => <Redirect to="/account/orders" />} />
                  <Route exact path="/account/orders" component={AccountOrders} />
                  <Route exact path="/account/orders/:id" component={AccountOrderDetail} />
                  <Route exact path="/account/analytics" component={AccountAnalytics} />
                  <Route exact path="/account/checkups" component={AccountCheckupsHistory} />
                  <Route exact path="/account/recipes" component={AccountRecipes} />
                  <Route exact path="/account/profile" component={AccountProfile} />
                </Switch>
              </AccountLayout>
            )} />
            <Redirect to="/" />
          </Switch>
        </main>
        <AuthModal />
        <CallbackModal />
        <NotifyModal />
        <RequestModal />
        <TestPanel />
        <Toast />
      </HashRouter>
    </AppProvider>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
